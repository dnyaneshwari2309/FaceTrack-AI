<!DOCTYPE html>
<html>
<head>
<title>FaceTrack AI | Attendance Reports</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#141e30,#243b55);
padding:40px;
color:white;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
border-radius:15px;
overflow:hidden;
}

th{
background:#243b55;
color:white;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f3f3f3;
}

.date-box{
text-align:center;
margin-bottom:20px;
}

input{
padding:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#00c6ff;
color:white;
cursor:pointer;
}

.back{
display:block;
text-align:center;
margin-top:20px;
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>📊 Attendance Reports</h1>

<div class="date-box">

<form method="GET">

<input type="date" name="date" value="{{ date }}">

<button type="submit">
Search
</button>

</form>

</div>

<table>

<tr>
<th>Student ID</th>
<th>Name</th>
<th>Time</th>
</tr>

{% for row in records %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
</tr>
{% endfor %}

</table>

<a class="back" href="/">
← Back to Dashboard
</a>

</div>

</body>
</html>
