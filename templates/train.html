<!DOCTYPE html>
<html>
<head>
<title>FaceTrack AI | Model Training</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
}

.card{
width:600px;
padding:40px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border-radius:20px;
text-align:center;
color:white;
box-shadow:0 8px 30px rgba(0,0,0,.3);
}

h1{
margin-bottom:20px;
}

p{
margin-bottom:25px;
color:#ddd;
}

button{
padding:15px 40px;
border:none;
border-radius:12px;
background:#00c6ff;
color:white;
font-size:18px;
cursor:pointer;
}

.success{
margin-top:20px;
padding:15px;
background:#28a745;
border-radius:10px;
}

.error{
margin-top:20px;
padding:15px;
background:#dc3545;
border-radius:10px;
}

a{
display:inline-block;
margin-top:20px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<h1>🧠 AI Model Training Center</h1>

<p>
Generate and update the face recognition model using all enrolled students.
</p>

<form method="POST">
<button type="submit">
🚀 Train Model
</button>
</form>

{% if done %}
<div class="success">
✅ Training Completed Successfully
<br><br>
Students: {{ students }}
<br>
Images Processed: {{ count }}
</div>
{% endif %}

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<a href="/">← Back to Dashboard</a>

</div>

</body>
</html>
